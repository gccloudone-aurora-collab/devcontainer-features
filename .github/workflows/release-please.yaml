---
name: "Release"

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: "Create or update release PRs"
        id: release-please
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: "Checkout code"
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: true

      - name: "Install latest devcontainer CLI"
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        run: npm install -g @devcontainers/cli

      - name: "Verify feature versions"
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        run: |
          set -euo pipefail

          for metadata in src/*/devcontainer-feature.json; do
            package_path="${metadata%/devcontainer-feature.json}"
            expected_version="$(jq -r --arg package_path "${package_path}" '.[$package_path]' .release-please-manifest.json)"
            actual_version="$(jq -r '.version' "${metadata}")"

            if [ "${expected_version}" != "${actual_version}" ]; then
              echo "::error title=Version mismatch::${metadata} has version ${actual_version}, expected ${expected_version} from .release-please-manifest.json"
              exit 1
            fi
          done

      - name: "Publish Features"
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          publish-features: "true"
          base-path-to-features: "./src"
          generate-docs: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: "Generate feature documentation"
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        run: |
          devcontainer features generate-docs \
            --project-folder ./src \
            --namespace "${{ github.repository }}" \
            --github-owner "${{ github.repository_owner }}" \
            --github-repo "${GITHUB_EVENT_REPOSITORY_NAME}"
        env:
          GITHUB_EVENT_REPOSITORY_NAME: ${{ github.event.repository.name }}

      - name: "Update root README"
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        run: ./scripts/update-root-readme.sh

      - name: "Create PR for documentation"
        if: ${{ steps.release-please.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config pull.rebase false

          branch=automated-documentation-update-${GITHUB_RUN_ID}
          message='chore: Automated documentation update'

          git checkout -b "${branch}"
          git add README.md src/*/README.md
          git commit -m 'chore: Automated documentation update [skip ci]' || {
            echo "No documentation updates found."
            exit 0
          }

          git push origin "${branch}"
          gh pr create --title "${message}" --body "${message}"
