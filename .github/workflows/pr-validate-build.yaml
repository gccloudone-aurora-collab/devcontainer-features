---
name: "Validate Features"

permissions: {}

on:
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - test/**

jobs:
  detect-changes:
    permissions: {}
    runs-on: ubuntu-latest
    outputs:
      features: ${{ steps.filter.outputs.changes }}
      autogenerated_features: ${{ steps.autogenerated_features.outputs.features }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            cert-update: ./**/cert-update/**
            databricks-cli: ./**/databricks-cli/**
            enhanced-docker-in-docker: ./**/enhanced-docker-in-docker/**
            enhanced-custom-root-ca: ./**/enhanced-custom-root-ca/**

      - name: "Select features with autogenerated tests"
        id: autogenerated_features
        run: |
          features="${STEPS_FILTER_OUTPUTS_CHANGES}"
          echo "features=$features" >> "$GITHUB_OUTPUT"
        env:
          STEPS_FILTER_OUTPUTS_CHANGES: ${{ steps.filter.outputs.changes }}

  test-autogenerated:
    permissions: {}
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.autogenerated_features != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ${{ fromJSON(needs.detect-changes.outputs.autogenerated_features) }}
        baseImage:
          - ubuntu:jammy
          - debian:11
          - debian:12
          - mcr.microsoft.com/devcontainers/base:ubuntu
          - mcr.microsoft.com/devcontainers/base:debian
          - mcr.microsoft.com/devcontainers/base:noble
        exclude:
          - features: enhanced-docker-in-docker
            baseImage: mcr.microsoft.com/devcontainers/base:debian
          - features: enhanced-docker-in-docker
            baseImage: mcr.microsoft.com/devcontainers/base:ubuntu
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: "Setup Node.js"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: "Install Node.js dependencies"
        run: npm ci

      - name: "Generating tests for '${{ matrix.features }}' against '${{ matrix.baseImage }}'"
        run: npm run devcontainer:test -- --skip-scenarios -f "${MATRIX_FEATURES}" -i ${{ matrix.baseImage }}
        env:
          MATRIX_FEATURES: ${{ matrix.features }}

  test-scenarios:
    permissions: {}
    needs: [detect-changes]
    if: ${{ needs.detect-changes.outputs.features != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ${{ fromJSON(needs.detect-changes.outputs.features) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: "Setup Node.js"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: "Install Node.js dependencies"
        run: npm ci

      - name: "Testing '${{ matrix.features }}' scenarios"
        run: npm run devcontainer:test -- -f "${MATRIX_FEATURES}" --skip-autogenerated --skip-duplicated
        env:
          MATRIX_FEATURES: ${{ matrix.features }}

  test-global:
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: "Setup Node.js"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: "Install Node.js dependencies"
        run: npm ci

      - name: "Testing global scenarios"
        run: npm run devcontainer:test -- --global-scenarios-only

  validate:
    permissions: {}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: "Validate devcontainer-feature.json files"
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          validate-only: "true"
          base-path-to-features: "./src"
